<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoolTick CMS | Premium Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --primary: #0d6efd;
      --success: #198754;
      --warning: #ffc107;
      --danger: #dc3545;
      --bg-body: #f4f7fe;
      --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: #334155; }

    /* Login Styles */
    #login-page { 
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at top right, #6ea8fe, var(--primary)); 
    }
    .login-card { border: none; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }

    /* Dashboard Styles */
    .navbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #eef0f7; }
    .card { border: none; border-radius: 20px; box-shadow: var(--card-shadow); transition: transform 0.2s ease; }
    .stat-card { background: linear-gradient(135deg, var(--primary), #0a58ca); color: white; }
    
    .table-container { background: white; border-radius: 20px; padding: 25px; border: 1px solid #eef0f7; }
    .nav-tabs { border: none; background: #eef2f7; border-radius: 12px; padding: 5px; }
    .nav-tabs .nav-link { border: none; border-radius: 10px; color: #64748b; font-weight: 600; padding: 10px 20px; }
    .nav-tabs .nav-link.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

    /* QTY Button Styles */
    .qty-box { background: #f1f5f9; border-radius: 10px; display: inline-flex; align-items: center; padding: 4px; }
    .btn-qty { width: 32px; height: 32px; border-radius: 8px; border: none; background: white; font-weight: bold; transition: 0.2s; }
    .btn-qty:hover { background: var(--primary); color: white; }
    .qty-val { min-width: 30px; text-align: center; font-weight: 700; color: var(--primary); }

    .badge-id { font-family: monospace; background: #e0e7ff; color: var(--primary); padding: 5px 10px; border-radius: 8px; font-weight: 600; }
    .btn-action { width: 38px; height: 38px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; }

    /* Custom Form Control */
    .form-control { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px 15px; }
    .form-control:focus { box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1); }
  </style>
</head>
<body>

<div id="login-page">
  <div class="card login-card p-5 text-center bg-white">
      <div class="display-4 text-primary mb-3"><i class="bi bi-water"></i></div>
      <h3 class="fw-bold mb-1">PoolTick CMS</h3>
      <p class="text-muted small mb-4">Portal Administrasi Kolam Renang</p>
      <div class="text-start mb-3">
          <label class="small fw-bold mb-1">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Admin Username">
      </div>
      <div class="text-start mb-4">
          <label class="small fw-bold mb-1">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••">
      </div>
      <button onclick="login()" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow">Login Sekarang</button>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold text-primary fs-4"><i class="bi bi-water me-2"></i>PoolTick</span>
      <div class="dropdown">
        <button class="btn btn-light rounded-pill dropdown-toggle px-3" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-1"></i> <b>Admin</b>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
          <li><button onclick="location.reload()" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row g-4 mb-4">
      <div class="col-lg-8">
        <div class="card stat-card p-4 h-100 d-flex flex-row align-items-center justify-content-between">
          <div>
            <h6 class="text-uppercase small opacity-75 fw-bold mb-1">Total Pendapatan Hari Ini</h6>
            <h1 id="total" class="fw-bold mb-0 display-4">Rp 0</h1>
          </div>
          <i class="bi bi-wallet2 display-1 opacity-25"></i>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card p-4 h-100 shadow-sm border-0">
          <h6 class="text-muted small fw-bold text-uppercase mb-3">Laporan Penjualan</h6>
          <button onclick="downloadExcel()" class="btn btn-success w-100 py-3 fw-bold rounded-4 shadow-sm">
            <i class="bi bi-file-earmark-spreadsheet me-2"></i>Download CSV
          </button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-xl-4">
        <div class="sticky-top" style="top: 90px;">
          
          <div class="card p-4 mb-4 border-0 shadow-sm" style="border-left: 5px solid var(--success) !important;">
            <h6 class="fw-bold text-success mb-3 small text-uppercase"><i class="bi bi-person-plus me-2"></i>Data Pelanggan</h6>
            <input type="text" id="buyerName" class="form-control" placeholder="Nama lengkap pembeli...">
            <small class="text-muted mt-2 d-block">*Wajib diisi sebelum melakukan transaksi</small>
          </div>

          <div class="card p-4 shadow-sm border-0">
            <h6 class="fw-bold mb-3 text-primary text-uppercase small"><i class="bi bi-pencil-square me-2"></i>Kelola Katalog</h6>
            <input type="hidden" id="editId">
            <div class="mb-3">
              <label class="small text-muted fw-bold">Nama Tiket</label>
              <input type="text" id="name" class="form-control mt-1" placeholder="Misal: Tiket Weekend">
            </div>
            <div class="mb-4">
              <label class="small text-muted fw-bold">Harga Satuan (IDR)</label>
              <input type="number" id="price" class="form-control mt-1" placeholder="50000">
            </div>
            <div class="d-grid gap-2">
              <button onclick="submitTiket()" id="btnSave" class="btn btn-primary py-3 fw-bold rounded-3 shadow">
                <i class="bi bi-save me-2"></i>Simpan Data Tiket
              </button>
              <button onclick="resetForm()" class="btn btn-light btn-sm">Batal / Reset</button>
            </div>
          </div>

        </div>
      </div>

      <div class="col-xl-8">
        <ul class="nav nav-tabs mb-4 shadow-sm" id="pills-tab" role="tablist">
          <li class="nav-item flex-fill">
            <button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#tab-katalog"><i class="bi bi-grid-fill me-2"></i>Katalog Tiket</button>
          </li>
          <li class="nav-item flex-fill">
            <button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#tab-transaksi"><i class="bi bi-clock-history me-2"></i>Riwayat Transaksi</button>
          </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
          <div class="tab-pane fade show active" id="tab-katalog">
            <div class="table-container shadow-sm border-0">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0 text-primary">Daftar Tiket</h5>
                <input type="text" class="form-control w-50" placeholder="Cari tiket..." id="searchTicket" onkeyup="filterTable()">
              </div>
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="bg-light">
                    <tr>
                      <th>ID</th><th>NAMA TIKET</th><th>HARGA</th><th class="text-center">KELOLA & BELI</th>
                    </tr>
                  </thead>
                  <tbody id="data"></tbody>
                </table>
              </div>
              <div class="text-end mt-4">
                <button onclick="beliSemua()" class="btn btn-success px-5 py-3 fw-bold rounded-pill shadow">
                  <i class="bi bi-cart-check me-2"></i>Checkout Terpilih
                </button>
              </div>
            </div>
          </div>

          <div class="tab-pane fade" id="tab-transaksi">
            <div class="table-container shadow-sm border-0">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0 text-dark">Log Transaksi</h5>
                <button onclick="hapusSemuaTransaksi()" class="btn btn-outline-danger btn-sm rounded-pill fw-bold">
                  <i class="bi bi-trash3-fill me-1"></i>Bersihkan Riwayat
                </button>
              </div>
              <div class="table-responsive">
                <table class="table table-striped align-middle">
                  <thead class="table-dark">
                    <tr>
                      <th>ID</th><th>PEMBELI</th><th>TIKET</th><th>NOMINAL</th><th>WAKTU</th><th class="text-center">AKSI</th>
                    </tr>
                  </thead>
                  <tbody id="transaksi"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_TICKETS = 'http://localhost:3000/tickets';
const API_TRANSACTIONS = 'http://localhost:3000/transactions';

let qtyMap = {}; 

const rupiah = (num) => new Intl.NumberFormat('id-ID', {
  style: 'currency', currency: 'IDR', minimumFractionDigits: 0
}).format(num);

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (user === "1" && pass === "1") {
    document.getElementById('login-page').style.display = "none";
    document.getElementById('dashboard').style.display = "block";
    loadData();
  } else { alert("Login Gagal! Username/Pass: 1"); }
}

async function loadData() {
  const [tickets, transactions] = await Promise.all([
    fetch(API_TICKETS).then(r => r.json()),
    fetch(API_TRANSACTIONS).then(r => r.json())
  ]);
  renderTickets(tickets);
  renderTransactions(transactions);
}

function renderTickets(tickets) {
  const dataEl = document.getElementById('data');
  dataEl.innerHTML = tickets.map(i => {
    if (qtyMap[i.id] == null) qtyMap[i.id] = 0;
    return `
    <tr>
      <td><span class="badge-id">#${i.id}</span></td>
      <td class="fw-bold">${i.name}</td>
      <td class="text-success fw-bold">${rupiah(i.price)}</td>
      <td class="text-center">
        <div class="d-flex align-items-center justify-content-center gap-2">
          <div class="qty-box">
            <button onclick="changeQty(${i.id}, -1)" class="btn-qty">-</button>
            <span id="qty-${i.id}" class="qty-val">${qtyMap[i.id]}</span>
            <button onclick="changeQty(${i.id}, 1)" class="btn-qty">+</button>
          </div>
          <button onclick="editTiket(${i.id}, '${i.name}', ${i.price})" class="btn btn-action btn-warning text-white"><i class="bi bi-pencil-fill"></i></button>
          <button onclick="hapusTiket(${i.id})" class="btn btn-action btn-outline-danger"><i class="bi bi-trash-fill"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function changeQty(id, change) {
  qtyMap[id] += change;
  if (qtyMap[id] < 0) qtyMap[id] = 0;
  document.getElementById(`qty-${id}`).innerText = qtyMap[id];
}

function editTiket(id, name, price) {
  document.getElementById('editId').value = id;
  document.getElementById('name').value = name;
  document.getElementById('price').value = price;
  document.getElementById('btnSave').innerHTML = '<i class="bi bi-arrow-repeat me-2"></i>Perbarui Data Tiket';
  document.getElementById('btnSave').className = 'btn btn-warning py-3 fw-bold rounded-3 shadow text-white';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function submitTiket() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('name').value;
  const price = parseInt(document.getElementById('price').value);
  if (!name || !price) return alert("Lengkapi data!");

  const method = id ? 'PATCH' : 'POST';
  const url = id ? `${API_TICKETS}/${id}` : API_TICKETS;

  await fetch(url, {
    method, headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, price })
  });
  resetForm();
  loadData();
}

function resetForm() {
  document.getElementById('editId').value = "";
  document.getElementById('name').value = "";
  document.getElementById('price').value = "";
  document.getElementById('btnSave').innerHTML = '<i class="bi bi-save me-2"></i>Simpan Data Tiket';
  document.getElementById('btnSave').className = 'btn btn-primary py-3 fw-bold rounded-3 shadow';
}

async function beliSemua() {
  const buyer = document.getElementById('buyerName').value;
  if (!buyer) return alert("Harap isi NAMA PELANGGAN!");
  
  const selectedTickets = Object.keys(qtyMap).filter(id => qtyMap[id] > 0);
  if (selectedTickets.length === 0) return alert("Pilih minimal 1 tiket!");

  const tickets = await fetch(API_TICKETS).then(r => r.json());

  for (let id of selectedTickets) {
    const t = tickets.find(ticket => ticket.id == id);
    const qty = qtyMap[id];
    for (let i = 0; i < qty; i++) {
      await fetch(API_TRANSACTIONS, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          ticketId: t.id, name: buyer, price: t.price, createdAt: new Date().toISOString()
        })
      });
    }
    qtyMap[id] = 0;
  }
  document.getElementById('buyerName').value = "";
  loadData();
  alert("Transaksi Berhasil!");
}

async function hapusTiket(id) {
  if (!confirm("Hapus tiket ini dari katalog?")) return;
  const trx = await fetch(API_TRANSACTIONS).then(r => r.json());
  if (trx.some(t => t.ticketId == id)) return alert("Gagal: Tiket ini masih memiliki data transaksi!");
  await fetch(`${API_TICKETS}/${id}`, { method: 'DELETE' });
  loadData();
}

async function hapusSemuaTransaksi() {
  if (!confirm("Hapus seluruh riwayat transaksi? Tindakan ini tidak bisa dibatalkan.")) return;
  const trx = await fetch(API_TRANSACTIONS).then(r => r.json());
  for (let t of trx) { await fetch(`${API_TRANSACTIONS}/${t.id}`, { method: 'DELETE' }); }
  loadData();
}

async function loadData() {
  const [tickets, transactions] = await Promise.all([
    fetch(API_TICKETS).then(r => r.json()),
    fetch(API_TRANSACTIONS).then(r => r.json())
  ]);
  
  renderTickets(tickets);
  // Kirim data tickets juga ke fungsi renderTransactions agar bisa dicari namanya
  renderTransactions(transactions, tickets); 
}

function renderTransactions(transactions, tickets) {
  const trxEl = document.getElementById('transaksi');
  let total = 0;
  
  trxEl.innerHTML = transactions.slice().reverse().map(i => {
    total += i.price;
    
    // CARI NAMA TIKET BERDASARKAN ID
    const dataTiket = tickets.find(t => t.id == i.ticketId);
    const namaTiket = dataTiket ? dataTiket.name : "Tiket dihapus";

    return `
      <tr>
        <td><small class="text-muted">#${i.id}</small></td>
        <td class="fw-bold">${i.name}</td>
        <td><span class="badge bg-light text-dark border">${namaTiket}</span></td>
        <td class="text-primary fw-bold">${rupiah(i.price)}</td>
        <td>${new Date(i.createdAt).toLocaleTimeString()}</td>
        <td class="text-center">
            <button onclick="hapusTransaksi(${i.id})" class="btn btn-sm btn-link text-danger p-0">
                <i class="bi bi-x-circle-fill fs-5"></i>
            </button>
        </td>
      </tr>`;
  }).join('');
  
  document.getElementById('total').innerText = rupiah(total);
}

function hapusTransaksi(id) {
  fetch(`${API_TRANSACTIONS}/${id}`, {method:'DELETE'}).then(loadData);
}

function filterTable() {
  const filter = document.getElementById('searchTicket').value.toUpperCase();
  const rows = document.getElementById('data').getElementsByTagName('tr');
  for (let row of rows) {
    const text = row.getElementsByTagName('td')[1].textContent.toUpperCase();
    row.style.display = text.indexOf(filter) > -1 ? "" : "none";
  }
}

async function downloadExcel() {
  const [dataTrx, dataTickets] = await Promise.all([
    fetch(API_TRANSACTIONS).then(r => r.json()),
    fetch(API_TICKETS).then(r => r.json())
  ]);

  if (!dataTrx.length) return alert("Tidak ada data untuk diunduh!");

  let totalKeseluruhan = 0;

  // 1. Siapkan Data untuk Excel
  const reportData = dataTrx.map((trx, index) => {
    const tiket = dataTickets.find(t => t.id == trx.ticketId);
    const harga = parseInt(trx.price) || 0;
    totalKeseluruhan += harga;

    return {
      "No": index + 1,
      "ID Transaksi": trx.id,
      "Nama Pembeli": trx.name,
      "Nama Tiket": tiket ? tiket.name : "Tiket Dihapus",
      "Harga (Rp)": harga,
      "Waktu Transaksi": new Date(trx.createdAt).toLocaleString('id-ID')
    };
  });

  // 2. Tambahkan Baris Total
  reportData.push({
    "No": "",
    "ID Transaksi": "",
    "Nama Pembeli": "TOTAL PENDAPATAN",
    "Nama Tiket": "",
    "Harga (Rp)": totalKeseluruhan,
    "Waktu Transaksi": ""
  });

  // 3. Buat Worksheet
  const ws = XLSX.utils.json_to_sheet(reportData);

  // 4. Styling Sederhana (Atur Lebar Kolom)
  const wscols = [
    {wch: 5},  // No
    {wch: 15}, // ID Transaksi
    {wch: 25}, // Nama Pembeli
    {wch: 25}, // Nama Tiket
    {wch: 15}, // Harga
    {wch: 25}  // Waktu
  ];
  ws['!cols'] = wscols;

  // 5. Buat Workbook dan Simpan
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Laporan Penjualan");

  // Download File .xlsx
  const fileName = `Laporan_PoolTick_Premium_${new Date().getTime()}.xlsx`;
  XLSX.writeFile(wb, fileName);
}
</script>
</body>
</html>
