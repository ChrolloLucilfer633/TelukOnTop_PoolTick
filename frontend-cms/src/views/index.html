<!DOCTYPE html>
<html>
<head>
  <title>PoolTick CMS</title>
</head>
<body>

<h1>🏊 PoolTick Dashboard</h1>

<h3 id="total"></h3>

<h2>Tambah Tiket</h2>

<input type="text" id="name" placeholder="Nama tiket">
<input type="number" id="price" placeholder="Harga">
<button onclick="tambahTiket()">Tambah</button><br><br>

<h2>Riwayat Transaksi</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nama Tiket</th>
      <th>Harga</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="transaksi"></tbody>
</table>

<br>

<h2>Daftar Tiket</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nama</th>
      <th>Harga</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>

// 🔥 FETCH TICKETS
fetch('http://localhost:3000/tickets')
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById('data');

    data.forEach(item => {
      table.innerHTML += `
        <tr>
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>${item.price}</td>
          <td>
            <button onclick="beliTiket('${item.name}', ${item.price})">Beli</button>
            <button onclick="hapusTiket(${item.id})">Hapus</button>
          </td>
        </tr>
      `;
    });
  });


// 🔥 FETCH TRANSAKSI
fetch('http://localhost:3000/transactions')
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById('transaksi');
    const total = document.getElementById('total');

    let totalTransaksi = 0;

    data.forEach(item => {
      totalTransaksi += item.price;

      table.innerHTML += `
        <tr>
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>${item.price}</td>
          <td>
            <button onclick="hapusTransaksi(${item.id})">Hapus</button>
          </td>
        </tr>
      `;
    });

    total.innerText = "Total Pendapatan: Rp " + totalTransaksi;
  });


// 🔥 TAMBAH TIKET
function tambahTiket() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;

  fetch('http://localhost:3000/tickets', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: name,
      price: parseInt(price)
    })
  })
  .then(() => {
    alert("Tiket berhasil ditambah!");
    location.reload();
  });
}


// 🔥 BELI TIKET → MASUK TRANSAKSI
function beliTiket(nama, harga) {
  fetch('http://localhost:3000/transactions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: nama,
      price: harga
    })
  })
  .then(() => {
    alert("Berhasil beli tiket!");
    location.reload();
  });
}


// 🔥 HAPUS TIKET
function hapusTiket(id) {
  fetch(`http://localhost:3000/tickets/${id}`, {
    method: 'DELETE'
  })
  .then(() => {
    alert("Tiket dihapus!");
    location.reload();
  });
}


// 🔥 HAPUS TRANSAKSI
function hapusTransaksi(id) {
  fetch(`http://localhost:3000/transactions/${id}`, {
    method: 'DELETE'
  })
  .then(() => {
    alert("Transaksi dihapus!");
    location.reload();
  });
}

</script>

</body>
</html>
