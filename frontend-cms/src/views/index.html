<!DOCTYPE html>
<html>
<head>
  <title>PoolTick CMS</title>
</head>
<body>
<div id="login">
  <h2>Login Admin</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">

<h1>🏊 PoolTick Dashboard</h1>

<h3 id="total"></h3>

<h2>Tambah Tiket</h2>

<input type="text" id="name" placeholder="Nama tiket">
<input type="number" id="price" placeholder="Harga">
<button onclick="tambahTiket()">Tambah</button><br><br>

<h2>Riwayat Transaksi</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nama Tiket</th>
      <th>Harga</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="transaksi"></tbody>
</table>

<br>

<h2>Daftar Tiket</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nama</th>
      <th>Harga</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
// login cms
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  // 🔥 login simple (hardcode dulu)
  if (user === "1" && pass === "1") {
    document.getElementById('login').style.display = "none";
    document.getElementById('dashboard').style.display = "block";
  } else {
    alert("Login gagal!");
  }
}

// 🔥 LOAD SEMUA DATA
function loadData() {

  document.getElementById('data').innerHTML = "";
  document.getElementById('transaksi').innerHTML = "";

  // 🔥 FETCH TICKETS
  fetch('http://localhost:3000/tickets')
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById('data');

      data.forEach(item => {
        table.innerHTML += `
          <tr>
            <td>${item.id}</td>
            <td>${item.ticket?.name || item.name}</td>
            <td>${item.price}</td>
            <td>
              <button onclick="beliTiket(${item.id}, '${item.name}', ${item.price})">Beli</button>
              <button onclick="hapusTiket(${item.id})">Hapus</button>
            </td>
          </tr>
        `;
      });
    });

  // 🔥 FETCH TRANSAKSI
  fetch('http://localhost:3000/transactions')
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById('transaksi');
      const total = document.getElementById('total');

      let totalTransaksi = 0;

      data.forEach(item => {
        totalTransaksi += item.price;

        table.innerHTML += `
          <tr>
            <td>${item.id}</td>
            <td>${item.ticket?.name || item.name}</td>
            <td>${item.price}</td>
            <td>
              <button onclick="hapusTransaksi(${item.id})">Hapus</button>
            </td>
          </tr>
        `;
      });

      total.innerText = "Total Pendapatan: Rp " + totalTransaksi;
    });
}

// 🔥 TAMBAH TIKET
function tambahTiket() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;

  fetch('http://localhost:3000/tickets', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: name,
      price: parseInt(price),
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Tiket berhasil ditambah!");
    loadData();
  })
  .catch(err => console.error("ERROR TAMBAH:", err));
}

// 🔥 BELI TIKET
function beliTiket(id, nama, harga) {
  console.log("ID DIKIRIM:", id);

  fetch('http://localhost:3000/transactions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      ticketId: id
    })
  })
  .then(res => res.json())
  .then(res => {
    console.log("RESP:", res);

    if (res.message) {
      alert(res.message);
    } else {
      alert("Berhasil beli tiket!");
    }

    loadData();
  })
  .catch(err => console.error(err));
}

// 🔥 HAPUS TIKET
function hapusTiket(id) {
  console.log("HAPUS TIKET ID:", id);

  fetch(`http://localhost:3000/tickets/${id}`, {
    method: 'DELETE'
  })
  .then(res => res.json())
  .then(res => {
    console.log("RESPON TIKET:", res);
    alert("Tiket dihapus!");
    loadData();
  })
  .catch(err => console.error("ERROR HAPUS TIKET:", err));
}

// 🔥 HAPUS TRANSAKSI (INI YANG KITA TRACK)
function hapusTransaksi(id) {
  console.log("HAPUS TRANSAKSI ID:", id);

  fetch(`http://localhost:3000/transactions/${id}`, {
    method: 'DELETE'
  })
  .then(res => res.json())
  .then(res => {
    console.log("RESPON TRANSAKSI:", res);
    alert("Transaksi dihapus!");
    loadData();
  })
  .catch(err => console.error("ERROR HAPUS TRANSAKSI:", err));
}

// 🔥 LOAD AWAL
loadData();

</script>
</div>
</body>
</html>
