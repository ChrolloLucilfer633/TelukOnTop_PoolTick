<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoolTick CMS | Premium Dashboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-blue: #0d6efd;
      --secondary-blue: #cfe2ff;
      --dark-blue: #084298;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f7fe;
      color: #334155;
    }

    /* Card & UI Styles */
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .stat-card { background: linear-gradient(45deg, var(--primary-blue), var(--dark-blue)); color: white; }
    .btn-primary { background-color: var(--primary-blue); border: none; border-radius: 10px; }
    .form-control { border-radius: 10px; }
    .table-container { background: white; border-radius: 16px; padding: 20px; border: 1px solid #eef0f7; }
    
    /* Login Section */
    #login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary-blue), #6ea8fe); }
    .login-card { border: none; border-radius: 20px; width: 100%; max-width: 400px; }

    .badge-id { font-family: monospace; color: var(--primary-blue); background: var(--secondary-blue); padding: 4px 8px; border-radius: 6px; }
  </style>
</head>
<body>

<div id="login">
  <div id="login-container">
    <div class="card login-card p-5 text-center shadow-lg">
        <div class="display-4 text-primary mb-2"><i class="bi bi-water"></i></div>
        <h3 class="fw-bold">PoolTick Login</h3>
        <input type="text" id="username" class="form-control my-3" placeholder="Username">
        <input type="password" id="password" class="form-control mb-4" placeholder="Password">
        <button onclick="login()" class="btn btn-primary w-100 py-2 fw-bold shadow">Sign In</button>
    </div>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <nav class="navbar navbar-light bg-white sticky-top mb-4 shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold text-primary"><i class="bi bi-water me-2"></i>PoolTick CMS</span>
      <div class="d-flex align-items-center">
        <span class="me-3 small">Halo, <b>Admin</b></span>
        <button onclick="location.reload()" class="btn btn-outline-danger btn-sm rounded-pill"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row g-4 mb-4">
      <div class="col-md-8">
        <div class="card stat-card p-4 h-100 d-flex flex-row align-items-center justify-content-between shadow">
          <div>
            <h6 class="text-uppercase small opacity-75">Total Pendapatan Hari Ini</h6>
            <h1 id="total" class="fw-bold mb-0 text-white display-5">Rp 0</h1>
          </div>
          <i class="bi bi-wallet2 display-3 opacity-25"></i>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-4 h-100 text-center shadow-sm">
          <h6 class="text-muted small">Cepat Cetak</h6>
          <button onclick="downloadExcel()" class="btn btn-success w-100 mt-2 py-3 shadow border-0 fw-bold">
            <i class="bi bi-file-earmark-spreadsheet me-2"></i>Download Laporan CSV
          </button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-4">
        <div class="sticky-top" style="top: 90px;">
          
          <div class="card p-4 mb-4 border-start border-4 border-success shadow-sm">
            <h6 class="fw-bold text-success mb-3 small text-uppercase"><i class="bi bi-person-fill me-2"></i>Input Nama Pembeli</h6>
            <input type="text" id="buyerName" class="form-control shadow-sm" placeholder="Masukkan nama pelanggan...">
            <small class="text-muted mt-2 d-block" style="font-size: 0.75rem;">*Isi nama sebelum menekan tombol 'Beli'</small>
          </div>

          <div class="card p-4 shadow-sm">
            <h6 class="fw-bold mb-3 text-primary text-uppercase small"><i class="bi bi-plus-circle-fill me-2"></i>Kelola Tiket</h6>
            <input type="hidden" id="editId">
            <div class="mb-2">
              <label class="small text-muted">Nama Tiket</label>
              <input type="text" id="name" class="form-control mb-2 shadow-sm" placeholder="Contoh: Tiket Dewasa">
            </div>
            <div class="mb-3">
              <label class="small text-muted">Harga (IDR)</label>
              <input type="number" id="price" class="form-control shadow-sm" placeholder="50000">
            </div>
            <div class="d-grid gap-2">
              <button onclick="submitTiket()" class="btn btn-primary fw-bold shadow">
                <i class="bi bi-check-lg"></i> Simpan Tiket
              </button>
              <button onclick="resetForm()" class="btn btn-light btn-sm text-muted">Batal / Reset</button>
            </div>
          </div>

        </div>
      </div>

      <div class="col-md-8">
        <div class="table-container shadow-sm mb-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0 text-primary">Daftar Tiket</h5>
            <input type="text" class="form-control form-control-sm w-50" placeholder="Cari tiket..." id="searchTicket" onkeyup="filterTable('data', 1)">
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light text-muted small">
                <tr>
                  <th>ID</th><th>NAMA</th><th>HARGA</th><th class="text-end">AKSI</th>
                </tr>
              </thead>
              <tbody id="data"></tbody>
            </table>
          </div>
        </div>

        <div class="table-container shadow-sm">
          <h5 class="fw-bold mb-3 text-info">Riwayat Transaksi Masuk</h5>
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead class="table-dark small">
                <tr>
                  <th>ID</th><th>PEMBELI</th><th>TIKET</th><th>NOMINAL</th><th>WAKTU</th><th class="text-center">AKSI</th>
                </tr>
              </thead>
              <tbody id="transaksi"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_TICKETS = 'http://localhost:3000/tickets';
const API_TRANSACTIONS = 'http://localhost:3000/transactions';

const rupiah = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (user === "1" && pass === "1") {
    document.getElementById('login').style.display = "none";
    document.getElementById('dashboard').style.display = "block";
    loadData();
  } else { alert("Login Gagal!"); }
}

async function loadData() {
  try {
    const [tickets, transactions] = await Promise.all([
      fetch(API_TICKETS).then(r => r.json()),
      fetch(API_TRANSACTIONS).then(r => r.json())
    ]);
    renderTickets(tickets);
    renderTransactions(transactions);
  } catch (err) { console.error("Error API"); }
}

function renderTickets(tickets) {
  const dataEl = document.getElementById('data');
  dataEl.innerHTML = tickets.map(i => `
    <tr>
      <td><span class="badge-id">#${i.id}</span></td>
      <td class="fw-bold">${i.name}</td>
      <td class="text-success fw-bold">${rupiah(i.price)}</td>
      <td class="text-end">
        <button onclick="editTiket(${i.id}, '${i.name}', ${i.price})" class="btn btn-sm btn-outline-warning border-0"><i class="bi bi-pencil-square"></i></button>
        <button onclick="beliTiket(${i.id})" class="btn btn-sm btn-success rounded-pill px-3 shadow-sm fw-bold"><i class="bi bi-cart-plus me-1"></i>Beli</button>
        <button onclick="hapusTiket(${i.id})" class="btn btn-sm btn-outline-danger border-0"><i class="bi bi-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function renderTransactions(transactions) {
  const trxEl = document.getElementById('transaksi');
  let total = 0;
  trxEl.innerHTML = transactions.map(i => {
    total += i.price;
    return `
      <tr class="small">
        <td class="text-muted">${i.id}</td>
        <td class="fw-bold">${i.name}</td>
        <td><span class="badge bg-light text-primary border">${i.ticket?.name || 'Tiket'}</span></td>
        <td class="fw-bold text-dark">${rupiah(i.price)}</td>
        <td class="text-muted">${i.createdAt ? new Date(i.createdAt).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) : '-'}</td>
        <td class="text-center"><button onclick="hapusTransaksi(${i.id})" class="btn btn-link text-danger p-0"><i class="bi bi-x-circle"></i></button></td>
      </tr>`;
  }).join('');
  document.getElementById('total').innerText = rupiah(total);
}

async function submitTiket() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('name').value;
  const price = parseInt(document.getElementById('price').value);
  if(!name || !price) return alert("Lengkapi data!");
  const method = id ? 'PATCH' : 'POST';
  const url = id ? `${API_TICKETS}/${id}` : API_TICKETS;
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, price}) });
  resetForm(); loadData();
}

function editTiket(id, name, price) {
  document.getElementById('editId').value = id;
  document.getElementById('name').value = name;
  document.getElementById('price').value = price;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetForm() {
  document.getElementById('editId').value = "";
  document.getElementById('name').value = "";
  document.getElementById('price').value = "";
}

async function beliTiket(id) {
  const buyer = document.getElementById('buyerName').value;
  if (!buyer) return alert("Isi NAMA PEMBELI dulu!");
  const t = await fetch(`${API_TICKETS}/${id}`).then(r => r.json());
  await fetch(API_TRANSACTIONS, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ticketId: t.id, name: buyer, price: t.price, createdAt: new Date().toISOString() })
  });
  document.getElementById('buyerName').value = "";
  loadData();
}

function hapusTiket(id) { if(confirm("Hapus tiket?")) fetch(`${API_TICKETS}/${id}`, {method:'DELETE'}).then(loadData); }
function hapusTransaksi(id) { if(confirm("Batalkan?")) fetch(`${API_TRANSACTIONS}/${id}`, {method:'DELETE'}).then(loadData); }

function filterTable(tableId, colIndex) {
  let input = document.getElementById('searchTicket').value.toUpperCase();
  let tr = document.getElementById(tableId).getElementsByTagName("tr");
  for (let i = 0; i < tr.length; i++) {
    let td = tr[i].getElementsByTagName("td")[colIndex];
    if (td) {
      let txtValue = td.textContent || td.innerText;
      tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
    }
  }
}

async function downloadExcel() {
  const data = await fetch(API_TRANSACTIONS).then(r => r.json());
  const today = new Date().toDateString();
  const filtered = data.filter(i => new Date(i.createdAt).toDateString() === today);
  if (!filtered.length) return alert("Tidak ada data hari ini!");
  let csv = "ID,Pembeli,Tiket,Harga,Waktu\n";
  filtered.forEach(i => { csv += `${i.id},${i.name},${i.ticket?.name || '-'},${i.price},${new Date(i.createdAt).toLocaleTimeString()}\n`; });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `Laporan_PoolTick.csv`; a.click();
}
</script>

</body>
</html>
