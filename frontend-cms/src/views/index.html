<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoolTick CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .bg-blue {
      background-color: #0d6efd;
    }
    .bg-light-blue {
      background-color: #e3f2fd;
    }
    .card {
      border: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    #login-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div id="login" class="container" style="display: block;">
  <div id="login-container">
    <div class="card p-4" style="width: 100%; max-width: 400px;">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">PoolTick</h2>
        <p class="text-muted">Login Admin</p>
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Masukkan Username">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Masukkan Password">
      </div>
      <button onclick="login()" class="btn btn-primary w-100 shadow-sm">Login</button>
    </div>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <nav class="navbar navbar-dark bg-blue mb-4 shadow">
    <div class="container">
      <span class="navbar-brand mb-0 h1 fw-bold">PoolTick Dashboard</span>
      <button class="btn btn-outline-light btn-sm" onclick="location.reload()">Logout</button>
    </div>
  </nav>

  <div class="container pb-5">
    <div class="row">
      <div class="col-12 mb-4">
        <div class="card bg-light-blue p-3 text-center border-info">
          <h3 id="total" class="m-0 text-primary fw-bold">Total Pendapatan: Rp 0</h3>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <div class="card p-4 h-100">
          <h4 class="mb-3 text-primary">Kelola Tiket</h4>
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label class="form-label small fw-bold">Nama Tiket</label>
            <input type="text" id="name" class="form-control" placeholder="Contoh: Tiket Dewasa">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Harga</label>
            <div class="input-group">
              <span class="input-group-text">Rp</span>
              <input type="number" id="price" class="form-control" placeholder="0">
            </div>
          </div>
          <div class="d-grid gap-2">
            <button onclick="submitTiket()" class="btn btn-primary">Simpan Tiket</button>
            <button onclick="resetForm()" class="btn btn-light border">Reset</button>
          </div>
        </div>
      </div>

      <div class="col-md-8 mb-4">
        <div class="card p-4 h-100">
          <h4 class="mb-3 text-primary">Daftar Tiket Tersedia</h4>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Nama</th>
                  <th>Harga</th>
                  <th class="text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="data"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-12">
        <div class="card p-4">
          <h4 class="mb-3 text-info">Riwayat Transaksi</h4>
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead class="bg-light-blue">
                <tr>
                  <th>ID</th>
                  <th>Nama Tiket</th>
                  <th>Harga</th>
                  <th class="text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="transaksi"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Logic 
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if (user === "1" && pass === "1") {
    document.getElementById('login').style.display = "none";
    document.getElementById('dashboard').style.display = "block";
    loadData();
  } else {
    alert("Login gagal! Coba lagi.");
  }
}

function loadData() {
  document.getElementById('data').innerHTML = "";
  document.getElementById('transaksi').innerHTML = "";

  fetch('http://localhost:3000/tickets')
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById('data');
      data.forEach(item => {
        table.innerHTML += `
          <tr>
            <td><span class="badge bg-secondary">${item.id}</span></td>
            <td class="fw-bold text-dark">${item.name}</td>
            <td>Rp ${item.price.toLocaleString()}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary" onclick="editTiket(${item.id}, '${item.name}', ${item.price})">Edit</button>
              <button class="btn btn-sm btn-outline-info" onclick="beliTiket(${item.id})">Beli</button>
              <button class="btn btn-sm btn-outline-danger" onclick="hapusTiket(${item.id})">Hapus</button>
            </td>
          </tr>
        `;
      });
    });

  fetch('http://localhost:3000/transactions')
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById('transaksi');
      const total = document.getElementById('total');
      let totalTransaksi = 0;

      data.forEach(item => {
        totalTransaksi += item.price;
        table.innerHTML += `
          <tr>
            <td>#${item.id}</td>
            <td>${item.ticket?.name || item.name}</td>
            <td class="text-success fw-bold">Rp ${item.price.toLocaleString()}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-danger" onclick="hapusTransaksi(${item.id})">Batalkan</button>
            </td>
          </tr>
        `;
      });
      total.innerText = "Total Pendapatan: Rp " + totalTransaksi.toLocaleString();
    });
}

function submitTiket() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;

  if (!name || !price) return alert("Isi data dengan lengkap!");

  const method = id ? 'PATCH' : 'POST';
  const url = id ? `http://localhost:3000/tickets/${id}` : 'http://localhost:3000/tickets';

  fetch(url, {
    method: method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, price: parseInt(price) })
  })
  .then(() => {
    alert(id ? "Berhasil diperbarui!" : "Tiket berhasil ditambahkan!");
    resetForm();
    loadData();
  });
}

function editTiket(id, name, price) {
  document.getElementById('editId').value = id;
  document.getElementById('name').value = name;
  document.getElementById('price').value = price;
  window.scrollTo(0,0);
}

function resetForm() {
  document.getElementById('editId').value = "";
  document.getElementById('name').value = "";
  document.getElementById('price').value = "";
}

function beliTiket(id) {
  // Ambil data tiket dulu untuk mendapatkan harga dan nama
  fetch(`http://localhost:3000/tickets/${id}`)
    .then(res => res.json())
    .then(ticket => {
      fetch('http://localhost:3000/transactions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          ticketId: ticket.id,
          name: ticket.name,
          price: ticket.price 
        })
      })
      .then(() => {
        alert("Pembelian Berhasil!");
        loadData();
      });
    });
}

function hapusTiket(id) {
  if(confirm("Hapus tiket ini?")) {
    fetch(`http://localhost:3000/tickets/${id}`, { method: 'DELETE' }).then(() => loadData());
  }
}

function hapusTransaksi(id) {
  if(confirm("Batalkan transaksi ini?")) {
    fetch(`http://localhost:3000/transactions/${id}`, { method: 'DELETE' }).then(() => loadData());
  }
}
</script>

</body>
</html>
