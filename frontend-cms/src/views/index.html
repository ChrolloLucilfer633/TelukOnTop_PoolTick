<!DOCTYPE html>
<html>
<head>
  <title>PoolTick CMS</title>
</head>
<body>
  <h1>Dashboard PoolTick</h1>

  <h2>Daftar Tiket</h2>
  <ul id="list"></ul>

  <script>
    fetch('http://localhost:3001/tickets')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('list');
        data.forEach(item => {
          const li = document.createElement('li');
          li.innerText = item.name + " - Rp " + item.price;
          list.appendChild(li);
        });
      })
      .catch(err => console.log(err));
  </script>
</body>
</html>
