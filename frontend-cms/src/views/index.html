<!DOCTYPE html>
<html>
<head>
  <title>PoolTick CMS</title>
</head>
<body>
<h1>🏊 PoolTick Dashboard</h1>

<h3 id="total"></h3>

<h2>Tambah Tiket</h2>

<input type="text" id="name" placeholder="Nama tiket">
<input type="number" id="price" placeholder="Harga">
<button onclick="tambahTiket()">Tambah</button><br>

<h2>Riwayat Transaksi</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nama Tiket</th>
      <th>Harga</th>
    </tr>
  </thead>
  <tbody id="transaksi"></tbody>
</table><br>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nama</th>
      <th>Harga</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
// 🔥 FETCH TICKETS
fetch('http://localhost:3000/tickets')
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById('data');
    const total = document.getElementById('total');

    let sum = 0;

    data.forEach(item => {
      sum += item.price;

      table.innerHTML += `
        <tr>
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>${item.price}</td>
        </tr>
      `;
    });

    total.innerText = "Total Pendapatan: Rp " + sum;
  });


// 🔥 FETCH TRANSAKSI (PINDAH KE SINI!)
fetch('http://localhost:3000/transactions')
  .then(res => res.json())
  .then(data => {
    const table = document.getElementById('transaksi');

    let totalTransaksi = 0;

    data.forEach(item => {
      totalTransaksi += item.price;

      table.innerHTML += `
        <tr>
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>${item.price}</td>
        </tr>
      `;
    });

    // 🔥 tampilkan total dari transaksi
    const total = document.getElementById('total');
    total.innerText = "Total Pendapatan (Real): Rp " + totalTransaksi;
  });


// 🔥 TAMBAH TIKET
function tambahTiket() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;

  fetch('http://localhost:3000/tickets', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: name,
      price: parseInt(price)
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Tiket berhasil ditambah!");
    location.reload();
  })
  .catch(err => console.error(err));
}
</script>
</body>
</html>
